{{ define "main" }}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #f8fafc;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --card-bg: rgba(255, 255, 255, 0.7);
    --card-border: rgba(255, 255, 255, 0.5);
    --card-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.05);
    --positive: #10b981;
    --negative: #ef4444;
    --accent: #3b82f6;
    --hover-y: -4px;
    --chart-grid: #e2e8f0;
  }

  .dark-theme {
    --bg-color: #0f172a;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --card-bg: rgba(30, 41, 59, 0.7);
    --card-border: rgba(255, 255, 255, 0.08);
    --card-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.3);
    --positive: #10b981;
    --negative: #f87171;
    --accent: #60a5fa;
    --chart-grid: #334155;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-main);
    transition: background-color 0.4s ease, color 0.4s ease;
    margin: 0;
  }

  #performance-app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
  }

  .title-area h1 {
    font-size: 2.5rem;
    font-weight: 700;
    margin: 0;
    background: linear-gradient(135deg, var(--text-main), var(--text-muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .theme-toggle {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text-main);
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.3s ease;
  }

  .theme-toggle:hover {
    transform: translateY(var(--hover-y));
    box-shadow: 0 10px 25px -4px rgba(0,0,0,0.1);
  }

  .theme-toggle svg { width: 24px; height: 24px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
    animation: slideUp 0.6s ease-out forwards;
  }

  .glass-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 24px;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .glass-card:hover {
    transform: translateY(var(--hover-y));
    box-shadow: 0 15px 30px -5px rgba(0,0,0,0.1);
  }

  .stat-title {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .stat-value {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text-main);
  }

  .main-layout {
    display: flex;
    flex-direction: column;
    gap: 30px;
  }

  @media (min-width: 992px) {
    .main-layout { flex-direction: row; }
    .chart-section { flex: 3; }
    .sidebar-section { flex: 1; min-width: 320px; }
  }

  .chart-section {
    display: flex;
    flex-direction: column;
    animation: slideUp 0.8s ease-out forwards;
  }

  .sidebar-section {
    animation: slideUp 1s ease-out forwards;
    display: flex;
    flex-direction: column;
  }

  .controls {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
    gap: 12px;
  }

  .controls label {
    font-weight: 600;
    color: var(--text-muted);
  }

  .custom-select {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--card-border);
    background: var(--card-bg);
    color: var(--text-main);
    font-family: inherit;
    font-size: 1rem;
    font-weight: 500;
    outline: none;
    cursor: pointer;
    box-shadow: var(--card-shadow);
  }

  #main-chart {
    width: 100%;
    height: 500px;
    border-radius: 12px;
  }

  .trades-header {
    font-size: 1.25rem;
    font-weight: 700;
    margin-top: 0;
    margin-bottom: 20px;
    border-bottom: 2px solid var(--card-border);
    padding-bottom: 12px;
  }

  .trades-list {
    max-height: 500px;
    overflow-y: auto;
    padding-right: 10px;
  }

  .trades-list::-webkit-scrollbar { width: 6px; }
  .trades-list::-webkit-scrollbar-track { background: transparent; }
  .trades-list::-webkit-scrollbar-thumb {
    background-color: var(--card-border);
    border-radius: 10px;
  }

  .trade-day { margin-bottom: 20px; }

  .trade-date {
    font-weight: 600;
    font-size: 1rem;
    color: var(--text-main);
    margin-bottom: 12px;
    padding-bottom: 4px;
    border-bottom: 1px dashed var(--card-border);
  }

  .trade-pill {
    display: flex;
    justify-content: space-between;
    background: rgba(0,0,0,0.03);
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 0.9rem;
    font-weight: 500;
  }
  .dark-theme .trade-pill { background: rgba(255,255,255,0.05); }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .color-pos { color: var(--positive) !important; }
  .color-neg { color: var(--negative) !important; }
  .color-neu { color: var(--text-main) !important; }

  .post-content {
    margin-bottom: 30px;
    font-size: 1.1rem;
    line-height: 1.6;
    color: var(--text-muted);
  }
</style>

<div id="performance-app">
  <div class="header-top">
    <div class="title-area">
      <h1 class="post-title">{{ .Title }}</h1>
    </div>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
      <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
      </svg>
      <svg id="sun-icon" style="display: none;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
      </svg>
    </button>
  </div>
  
  <div class="post-content">
    {{ .Content }}
  </div>

  <div class="stats-grid" id="stats-container">
    <!-- Stats Cards Will Be Injected Here -->
  </div>

  <div class="main-layout">
    <div class="chart-section glass-card">
      <div class="controls">
        <label for="startDateSelector">起始点 Start Date:</label>
        <select id="startDateSelector" class="custom-select"></select>
      </div>
      <div id="main-chart"></div>
    </div>

    <div class="sidebar-section glass-card">
      <h2 class="trades-header">近一周交易细节<br><small style="font-size:0.8rem;color:var(--text-muted);font-weight:normal">Recent Trades</small></h2>
      <div id="recent-trades-container" class="trades-list"></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>

<script type="text/javascript">
  var allPerformanceData = {{ site.Data.trading_performance_v2 | jsonify | safeJS }};
  
  const chartColors = {
    light: { text: '#475569', line: '#3b82f6', areaTop: 'rgba(59, 130, 246, 0.4)', areaBot: 'rgba(59, 130, 246, 0.0)', grid: '#e2e8f0', tooltipBg: 'rgba(255, 255, 255, 0.9)', tooltipText: '#0f172a' },
    dark: { text: '#94a3b8', line: '#60a5fa', areaTop: 'rgba(96, 165, 250, 0.3)', areaBot: 'rgba(96, 165, 250, 0.0)', grid: '#334155', tooltipBg: 'rgba(30, 41, 59, 0.9)', tooltipText: '#f8fafc' }
  };

  let currentMode = 'light';
  var myChart = echarts.init(document.getElementById('main-chart'));
  var datePicker = document.getElementById('startDateSelector');

  const themeToggleBtn = document.getElementById('theme-toggle');
  const moonIcon = document.getElementById('moon-icon');
  const sunIcon = document.getElementById('sun-icon');
  
  function setMode(mode) {
    currentMode = mode;
    if (mode === 'dark') {
      document.body.classList.add('dark-theme');
      moonIcon.style.display = 'none';
      sunIcon.style.display = 'block';
    } else {
      document.body.classList.remove('dark-theme');
      moonIcon.style.display = 'block';
      sunIcon.style.display = 'none';
    }
    updateChart(); 
  }

  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    setMode('dark');
  }

  themeToggleBtn.addEventListener('click', () => {
    setMode(currentMode === 'light' ? 'dark' : 'light');
  });

  function calculateCumulativeReturn(data, startDate) {
    const startIndex = data.findIndex(item => item.date === startDate);
    if (startIndex === -1) return [];
    const relevantData = data.slice(startIndex);
    let cumulativeProduct = 1.0;
    const cumulativeData = [];
    relevantData.forEach(item => {
      const dailyReturnDecimal = item.total / 100;
      cumulativeProduct = cumulativeProduct * (1 + dailyReturnDecimal);
      cumulativeData.push({
        date: item.date,
        dailyTotal: item.total,
        cumulative: (cumulativeProduct - 1) * 100,
        trades: item.trades
      });
    });
    return cumulativeData;
  }

  function calculatePeriodStats(dataSlice) {
    if (dataSlice.length === 0) return { cumulativeReturn: 0, winRate: 0 };
    let cumulativeProduct = 1.0;
    dataSlice.forEach(item => { cumulativeProduct *= (1 + item.total / 100); });
    const cumulativeReturn = (cumulativeProduct - 1) * 100;

    let winningTrades = 0, totalTrades = 0;
    dataSlice.forEach(day => {
      if (day.trades) {
        Object.values(day.trades).forEach(tradeValue => {
          totalTrades++;
          if (parseFloat(tradeValue) > 0) winningTrades++;
        });
      }
    });
    const winRate = totalTrades === 0 ? 0 : (winningTrades / totalTrades) * 100;
    return { cumulativeReturn, winRate };
  }

  function calculateGlobalStats(data) {
    if (!data || data.length < 2) return { totalReturn: 0, annualizedReturn: 0, maxDrawdown: 0, sharpeRatio: 0, overallWinRate: 0 };
    const dailyReturns = data.map(d => d.total / 100);
    const days = data.length;

    const totalReturn = (dailyReturns.reduce((acc, r) => acc * (1 + r), 1.0) - 1) * 100;
    const annualizedReturn = (Math.pow(1 + totalReturn / 100, 365 / days) - 1) * 100;
    
    let peak = -Infinity, maxDrawdown = 0, cumulativeValue = 1.0;
    dailyReturns.forEach(r => {
      cumulativeValue *= (1 + r);
      peak = Math.max(peak, cumulativeValue);
      const drawdown = (peak - cumulativeValue) / peak;
      maxDrawdown = Math.max(maxDrawdown, drawdown);
    });

    const meanReturn = dailyReturns.reduce((a, b) => a + b, 0) / days;
    const stdDev = Math.sqrt(dailyReturns.map(r => Math.pow(r - meanReturn, 2)).reduce((a, b) => a + b, 0) / days);
    const sharpeRatio = stdDev === 0 ? 0 : (meanReturn / stdDev) * Math.sqrt(365);

    const { winRate: overallWinRate } = calculatePeriodStats(data);
    return { totalReturn, annualizedReturn, maxDrawdown: maxDrawdown * 100, sharpeRatio, overallWinRate };
  }

  function populateDatePicker() {
    allPerformanceData.forEach(item => {
      const option = document.createElement('option');
      option.value = item.date;
      option.textContent = item.date;
      datePicker.appendChild(option);
    });
  }

  function updateChart() {
    const selectedStartDate = datePicker.value;
    const chartData = calculateCumulativeReturn(allPerformanceData, selectedStartDate);
    const dates = chartData.map(item => item.date);
    const cumulativeValues = chartData.map(item => parseFloat(item.cumulative.toFixed(2)));
    
    const palette = chartColors[currentMode];

    var option = {
      backgroundColor: 'transparent',
      tooltip: {
        trigger: 'axis',
        backgroundColor: palette.tooltipBg,
        borderColor: palette.grid,
        textStyle: { color: palette.tooltipText },
        padding: 16,
        formatter: function (params) {
          const dayData = chartData[params[0].dataIndex];
          if (!dayData) return;
          const cumColor = dayData.cumulative >= 0 ? '#10b981' : '#ef4444';
          const dayColor = dayData.dailyTotal >= 0 ? '#10b981' : '#ef4444';
          let tooltipHtml = `<div style="font-weight:600;margin-bottom:8px;font-size:1.1em">${dayData.date}</div>`;
          tooltipHtml += `<div style="display:flex;justify-content:space-between;gap:20px;margin-bottom:4px;"><span>累计收益 Cumulative</span> <strong style="color: ${cumColor};">${dayData.cumulative.toFixed(2)}%</strong></div>`;
          tooltipHtml += `<div style="display:flex;justify-content:space-between;gap:20px;margin-bottom:8px;"><span>单日盈亏 Daily</span> <strong style="color: ${dayColor};">${dayData.dailyTotal}%</strong></div>`;
          
          if (dayData.trades && Object.keys(dayData.trades).length > 0) {
            tooltipHtml += `<div style="border-top:1px solid ${palette.grid};margin:10px 0;"></div>`;
            tooltipHtml += `<div style="font-size:0.9em;color:${palette.text};margin-bottom:4px;">当日交易详情 Details:</div>`;
            for (const coin in dayData.trades) {
              const tradeVal = parseFloat(dayData.trades[coin]);
              const color = tradeVal >= 0 ? '#10b981' : '#ef4444';
              tooltipHtml += `<div style="display:flex;justify-content:space-between;font-size:0.9em"><span>${coin}</span><strong style="color:${color}">${dayData.trades[coin]}</strong></div>`;
            }
          }
          return tooltipHtml;
        }
      },
      grid: { left: '3%', right: '4%', bottom: '5%', top: '5%', containLabel: true },
      xAxis: {
        type: 'category', 
        boundaryGap: false, 
        data: dates,
        axisLine: { lineStyle: { color: palette.grid } },
        axisLabel: { 
          color: palette.text,
          fontWeight: '500', 
          fontSize: 12,
          formatter: function (value) {
            let parts = value.split(/[.-]/);
            if (parts.length === 3) return parts[1] + '/' + parts[2];
            return value;
          }
        }
      },
      yAxis: { 
        type: 'value', 
        splitLine: { lineStyle: { color: palette.grid, type: 'dashed' } },
        axisLabel: { color: palette.text, formatter: '{value} %', fontWeight: 'bold', fontSize: 13 }
      },
      dataZoom: [ { type: 'inside', start: 0, end: 100 } ],
      series: [ { 
        name: '累计收益率', 
        type: 'line', 
        smooth: true, 
        symbol: 'circle',
        symbolSize: 6,
        showSymbol: false,
        lineStyle: { width: 3, color: palette.line }, 
        itemStyle: { color: palette.line, borderWidth: 2 },
        areaStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: palette.areaTop },
            { offset: 1, color: palette.areaBot }
          ])
        },
        data: cumulativeValues 
      } ]
    };
    myChart.setOption(option, true);
  }

  function updateAllStatsDisplays() {
    const globalStats = calculateGlobalStats(allPerformanceData);
    const stats7days = calculatePeriodStats(allPerformanceData.slice(-7));
    const stats30days = calculatePeriodStats(allPerformanceData.slice(-30));
    const container = document.getElementById('stats-container');

    function createStatCard(title, value, unit = '', isPos = null) {
      const colorClass = isPos === true ? 'color-pos' : (isPos === false ? 'color-neg' : 'color-neu');
      return `
        <div class="glass-card">
          <div class="stat-title">${title}</div>
          <div class="stat-value ${colorClass}">${value}${unit}</div>
        </div>
      `;
    }

    container.innerHTML = 
      createStatCard('总收益率 Total Return', globalStats.totalReturn.toFixed(2), '%', globalStats.totalReturn >= 0) +
      createStatCard('年化收益 Annualized', globalStats.annualizedReturn.toFixed(2), '%', globalStats.annualizedReturn >= 0) +
      createStatCard('最大回撤 Max Drawdown', globalStats.maxDrawdown.toFixed(2), '%', false) +
      createStatCard('夏普比率 Sharpe Ratio', globalStats.sharpeRatio.toFixed(2), '', globalStats.sharpeRatio >= 0) +
      createStatCard('总胜率 Win Rate', globalStats.overallWinRate.toFixed(1), '%') +
      createStatCard('近7天收益 7D Return', stats7days.cumulativeReturn.toFixed(2), '%', stats7days.cumulativeReturn >= 0) +
      createStatCard('近30天收益 30D Return', stats30days.cumulativeReturn.toFixed(2), '%', stats30days.cumulativeReturn >= 0);
  }

  function updateRecentTradesDisplay() {
    const recent7DaysData = allPerformanceData.slice(-10).reverse();
    const container = document.getElementById('recent-trades-container');
    let htmlContent = '';

    if (recent7DaysData.length === 0) {
      htmlContent = '<p class="color-neu" style="opacity:0.6;font-size:0.9rem;">暂无交易数据 No Trades</p>';
    } else {
      recent7DaysData.forEach(dayData => {
        htmlContent += `<div class="trade-day"><div class="trade-date">${dayData.date}</div>`;
        const trades = dayData.trades;
        if (trades && Object.keys(trades).length > 0) {
          for (const coin in trades) {
            const val = parseFloat(trades[coin]);
            const colorClass = val >= 0 ? 'color-pos' : 'color-neg';
            htmlContent += `
              <div class="trade-pill">
                <span style="font-weight:600;">${coin}</span>
                <span class="${colorClass}">${trades[coin]}</span>
              </div>`;
          }
        } else {
          htmlContent += '<div class="trade-pill" style="opacity:0.6">无交易 No trades</div>';
        }
        htmlContent += `</div>`;
      });
    }
    container.innerHTML = htmlContent;
  }

  populateDatePicker();
  updateAllStatsDisplays();
  updateRecentTradesDisplay();
  
  if(!document.body.classList.contains('dark-theme') && currentMode === 'light'){
      updateChart(); 
  }

  datePicker.addEventListener('change', updateChart);
  window.addEventListener('resize', () => myChart.resize());
</script>
{{ end }}
